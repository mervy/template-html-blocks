<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Alt - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5 bg-light">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Portfólio de Projetos</h2>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="position-relative overflow-hidden rounded-3 shadow" style="height: 300px;">
            <img src="https://picsum.photos/600/400?random=33" alt="Portfolio" class="img-fluid w-100 h-100" style="object-fit: cover;">
            <div class="position-absolute bottom-0 start-0 end-0 bg-gradient p-3" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h6 class="text-white fw-bold mb-0">Projeto Um</h6>
              <small class="text-white-50">Categoria</small>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="position-relative overflow-hidden rounded-3 shadow" style="height: 300px;">
            <img src="https://picsum.photos/600/400?random=34" alt="Portfolio" class="img-fluid w-100 h-100" style="object-fit: cover;">
            <div class="position-absolute bottom-0 start-0 end-0 bg-gradient p-3" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h6 class="text-white fw-bold mb-0">Projeto Dois</h6>
              <small class="text-white-50">Categoria</small>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="position-relative overflow-hidden rounded-3 shadow" style="height: 300px;">
            <img src="https://picsum.photos/600/400?random=35" alt="Portfolio" class="img-fluid w-100 h-100" style="object-fit: cover;">
            <div class="position-absolute bottom-0 start-0 end-0 bg-gradient p-3" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h6 class="text-white fw-bold mb-0">Projeto Três</h6>
              <small class="text-white-50">Categoria</small>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="position-relative overflow-hidden rounded-3 shadow" style="height: 300px;">
            <img src="https://picsum.photos/600/400?random=36" alt="Portfolio" class="img-fluid w-100 h-100" style="object-fit: cover;">
            <div class="position-absolute bottom-0 start-0 end-0 bg-gradient p-3" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h6 class="text-white fw-bold mb-0">Projeto Quatro</h6>
              <small class="text-white-50">Categoria</small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
