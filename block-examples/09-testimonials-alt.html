<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials Alt - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Depoimentos com Imagem</h2>
      <div class="row g-4 align-items-center">
        <div class="col-lg-7">
          <img src="https://picsum.photos/500/400?random=19" alt="Testimonial" class="img-fluid rounded-4 shadow">
        </div>
        <div class="col-lg-5">
          <div class="position-relative">
            <blockquote class="blockquote mb-4">
              <p class="mb-3 fs-5">"Lorem ipsum dolor sit amet, consectetur adipisicing elit. Reiciendis aliquid atque, nulla? Quos cum ex quis soluta."</p>
              <footer class="blockquote-footer">
                <strong>António Silva</strong> - CEO StartUp
              </footer>
            </blockquote>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-chevron-left"></i></button>
            <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-chevron-right"></i></button>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
