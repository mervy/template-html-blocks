<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Alt - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5">
    <div class="container-xxl">
      <div class="row g-5">
        <div class="col-lg-6">
          <h2 class="fw-bold mb-4">Fale Conosco</h2>
          <p class="text-muted mb-4">Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
          <ul class="list-unstyled">
            <li class="mb-4 d-flex gap-3">
              <i class="bi bi-geo-alt-fill text-primary fs-5"></i>
              <div>
                <h6 class="fw-bold">Endereço</h6>
                <p class="text-muted small mb-0">Rua Example, 123 - City, State</p>
              </div>
            </li>
            <li class="mb-4 d-flex gap-3">
              <i class="bi bi-telephone-fill text-primary fs-5"></i>
              <div>
                <h6 class="fw-bold">Telefone</h6>
                <p class="text-muted small mb-0">+55 (11) 1234-5678</p>
              </div>
            </li>
            <li class="d-flex gap-3">
              <i class="bi bi-envelope-fill text-primary fs-5"></i>
              <div>
                <h6 class="fw-bold">Email</h6>
                <p class="text-muted small mb-0">contato@example.com</p>
              </div>
            </li>
          </ul>
        </div>
        <div class="col-lg-6">
          <form>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Seu nome">
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="seu@email.com">
            </div>
            <div class="mb-3">
              <textarea class="form-control" rows="4" placeholder="Sua mensagem..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
