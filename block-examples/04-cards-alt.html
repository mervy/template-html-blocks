<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards Alt - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5 bg-light">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Cards com Overlay</h2>
      <div class="row g-4">
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow h-100 position-relative overflow-hidden">
            <img src="https://picsum.photos/400/300?random=6" alt="Card" class="card-img" style="height: 250px; object-fit: cover;">
            <div class="card-img-overlay d-flex flex-column justify-content-end bg-gradient" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h5 class="card-title text-white fw-bold">Card Overlay</h5>
              <p class="card-text text-white-50 small">Hover para ver efeito overlay</p>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow h-100 position-relative overflow-hidden">
            <img src="https://picsum.photos/400/300?random=7" alt="Card" class="card-img" style="height: 250px; object-fit: cover;">
            <div class="card-img-overlay d-flex flex-column justify-content-end bg-gradient" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h5 class="card-title text-white fw-bold">Design Moderno</h5>
              <p class="card-text text-white-50 small">Componente elegante e limpo</p>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow h-100 position-relative overflow-hidden">
            <img src="https://picsum.photos/400/300?random=8" alt="Card" class="card-img" style="height: 250px; object-fit: cover;">
            <div class="card-img-overlay d-flex flex-column justify-content-end bg-gradient" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);">
              <h5 class="card-title text-white fw-bold">Responsivo</h5>
              <p class="card-text text-white-50 small">Adapta em qualquer tela</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
