<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards Grid — Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body style="background:#111;">

  <section>
    <div class="position-relative overflow-hidden" style="height:420px;">
      <img src="https://picsum.photos/id/1015/1400/600" class="w-100 h-100 object-fit-cover" alt="">
      <div class="position-absolute top-0 start-0 end-0 bottom-0" style="background:linear-gradient(to right,rgba(0,0,0,.82) 0%,rgba(0,0,0,.4) 60%,transparent 100%);"></div>

      <!-- Conteúdo overlay -->
      <div class="position-absolute bottom-0 start-0 p-4 p-lg-5" style="max-width:720px;">
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <span class="badge text-uppercase fw-bold px-2 text-white" style="background:#e53935;font-size:.65rem;">Miguel</span>
          <span class="badge text-uppercase fw-bold px-2 text-white" style="background:#1565c0;font-size:.65rem;">Vídeos e Filmes</span>
          <span class="badge text-uppercase fw-bold px-2 text-white" style="background:#2e7d32;font-size:.65rem;">14 artigos do autor</span>
        </div>
        <h2 class="text-white fw-bolder lh-sm mb-3" style="font-size:clamp(1.4rem,3vw,2.2rem);">Já chega a 12 o número de mortes e desaparecimentos de cientistas dos EUA. Entenda.</h2>
        <p class="text-white-75 mb-3" style="font-size:.9rem;opacity:.8;">Especialistas investigados pelo FBI, programas militares secretos em questão: o silêncio das autoridades e as lacunas de informação.</p>
        <div class="d-flex align-items-center gap-2">
          <img src="https://picsum.photos/seed/miguelauthor/50/50" class="rounded-circle" width="32" height="32" alt="">
          <small class="text-white-75" style="font-size:.78rem;opacity:.8;">POR MARCOS INVESTIGAÇÃO</small>
        </div>
      </div>

      <!-- Controles de carousel -->
      <div class="position-absolute bottom-0 end-0 p-4 d-flex gap-2">
        <button class="btn btn-sm rounded-circle border border-white text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px;background:rgba(255,255,255,.15);">
          <i class="bi bi-chevron-left"></i>
        </button>
        <button class="btn btn-sm rounded-circle border border-white text-white d-flex align-items-center justify-content-center" style="width:36px;height:36px;background:rgba(255,255,255,.15);">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
