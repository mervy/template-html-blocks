<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5 bg-light">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Tabela de Preços</h2>
      <div class="row g-4">
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow">
            <div class="card-body text-center">
              <h5 class="card-title fw-bold">Starter</h5>
              <h2 class="display-5 text-primary fw-bold my-3">R$29</h2>
              <p class="text-muted mb-4">por mês</p>
              <ul class="list-unstyled mb-4 small">
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>5 Projetos</li>
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>Suporte Email</li>
                <li class="mb-2"><i class="bi bi-x-circle text-danger me-2"></i>API Acesso</li>
              </ul>
              <button class="btn btn-outline-primary w-100">Escolher Plano</button>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow border-primary border-2">
            <div class="position-absolute top-0 start-50 translate-middle">
              <span class="badge bg-primary">Popular</span>
            </div>
            <div class="card-body text-center">
              <h5 class="card-title fw-bold mt-3">Professional</h5>
              <h2 class="display-5 text-primary fw-bold my-3">R$79</h2>
              <p class="text-muted mb-4">por mês</p>
              <ul class="list-unstyled mb-4 small">
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>Ilimitados</li>
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>Suporte Prioritário</li>
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>API Acesso</li>
              </ul>
              <button class="btn btn-primary w-100">Escolher Plano</button>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow">
            <div class="card-body text-center">
              <h5 class="card-title fw-bold">Enterprise</h5>
              <h2 class="display-5 text-primary fw-bold my-3">Custom</h2>
              <p class="text-muted mb-4">personalizado</p>
              <ul class="list-unstyled mb-4 small">
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>Tudo</li>
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>Suporte 24/7</li>
                <li class="mb-2"><i class="bi bi-check-circle text-success me-2"></i>SLA</li>
              </ul>
              <button class="btn btn-outline-primary w-100">Fale Conosco</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
