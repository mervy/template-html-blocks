<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<body>

                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
              </div>
              <p class="card-text mb-3">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Reiciendis aliquid.</p>
              <div class="d-flex align-items-center gap-3">
                <img src="https://picsum.photos/50/50?random=16" alt="Avatar" class="rounded-circle" width="50">
                <div>
                  <strong class="d-block">João Silva</strong>
                  <small class="text-muted">CEO Company</small>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow">
            <div class="card-body">
              <div class="d-flex gap-2 mb-3">
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>
              </div>
              <p class="card-text mb-3">Excelente qualidade! Recomendo para todos seus projetos.</p>
              <div class="d-flex align-items-center gap-3">
                <img src="https://picsum.photos/50/50?random=17" alt="Avatar" class="rounded-circle" width="50">
                <div>
                  <strong class="d-block">Maria Santos</strong>
                  <small class="text-muted">Designer</small>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow">
            <div class="card-body">
              <div class="d-flex gap-2 mb-3">
                <i class="bi bi-star-fill text-warning"></i>
                <i class="bi bi-star-fill text-warning"></i>

              <div class="d-flex align-items-center gap-3">
                <img src="https://picsum.photos/50/50?random=18" alt="Avatar" class="rounded-circle" width="50">
                <div>
                  <strong class="d-block">Pedro Costa</strong>
                  <small class="text-muted">Desenvolvedor</small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

</html>
