<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5 bg-light">
    <div class="container-xxl">
      <div class="row">
        <div class="col-lg-8 mx-auto">
          <h2 class="text-center fw-bold mb-5">Entre em Contato</h2>
          <form>
            <div class="mb-3">
              <label class="form-label fw-bold">Nome Completo</label>
              <input type="text" class="form-control form-control-lg" placeholder="Seu nome">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Email</label>
              <input type="email" class="form-control form-control-lg" placeholder="seu@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Assunto</label>
              <input type="text" class="form-control form-control-lg" placeholder="Qual o assunto?">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Mensagem</label>
              <textarea class="form-control form-control-lg" rows="5" placeholder="Sua mensagem..."></textarea>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-send me-2"></i>Enviar Mensagem
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
