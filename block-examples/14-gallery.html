<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Gallery - Block Examples</title>

<body>

        <div class="col-md-6 col-lg-4">

        </div>
        <div class="col-md-6 col-lg-4">
          <img src="https://picsum.photos/400/300?random=29" alt="Gallery" class="img-fluid rounded shadow w-100">
        </div>
        <div class="col-md-6 col-lg-4">
          <img src="https://picsum.photos/400/300?random=30" alt="Gallery" class="img-fluid rounded shadow w-100">
        </div>
        <div class="col-md-6 col-lg-4">
          <img src="https://picsum.photos/400/300?random=31" alt="Gallery" class="img-fluid rounded shadow w-100">
        </div>
        <div class="col-md-6 col-lg-4">
          <img src="https://picsum.photos/400/300?random=32" alt="Gallery" class="img-fluid rounded shadow w-100">
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
