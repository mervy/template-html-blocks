<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Alt - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Planos de Assinatura</h2>
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card border-0 shadow h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <h5 class="card-title fw-bold">Plano Básico</h5>
                  <p class="text-muted small">Para começar</p>
                </div>
                <span class="badge bg-secondary">3 meses grátis</span>
              </div>
              <h3 class="fw-bold mb-3">R$0<small class="text-muted">/mês</small></h3>
              <ul class="list-unstyled mb-4 small">
                <li class="mb-2"><i class="bi bi-check text-success me-2"></i>Até 5 usuários</li>
                <li class="mb-2"><i class="bi bi-check text-success me-2"></i>1 GB storage</li>
                <li class="mb-2"><i class="bi bi-check text-success me-2"></i>Suporte comunidade</li>
              </ul>
              <button class="btn btn-outline-primary w-100">Começar Grátis</button>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card border-0 shadow h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <h5 class="card-title fw-bold">Plano Pro</h5>
                  <p class="text-muted small">Para crescer</p>
                </div>
                <span class="badge bg-success">Mais Popular</span>
              </div>
              <h3 class="fw-bold mb-3">R$99<small class="text-muted">/mês</small></h3>
              <ul class="list-unstyled mb-4 small">
                <li class="mb-2"><i class="bi bi-check text-success me-2"></i>Usuários ilimitados</li>
                <li class="mb-2"><i class="bi bi-check text-success me-2"></i>100 GB storage</li>
                <li class="mb-2"><i class="bi bi-check text-success me-2"></i>Suporte prioritário</li>
              </ul>
              <button class="btn btn-primary w-100">Assinar Agora</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
