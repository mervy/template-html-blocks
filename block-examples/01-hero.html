<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5 bg-gradient bg-primary text-white">
    <div class="container-xxl">
      <div class="row align-items-center g-5">
        <div class="col-lg-6">
          <h1 class="display-4 fw-bold mb-3">Bem-vindo ao Hero Section</h1>
          <p class="lead mb-4">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Reiciendis aliquid atque, nulla? Quos cum ex quis soluta, a laboriosam.</p>
          <div class="d-flex gap-2">
            <button class="btn btn-light btn-lg">Começar</button>
            <button class="btn btn-outline-light btn-lg">Conhecer Mais</button>
          </div>
        </div>
        <div class="col-lg-6">
          <img src="https://picsum.photos/500/400?random=1" alt="Hero" class="img-fluid rounded-4 shadow">
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
