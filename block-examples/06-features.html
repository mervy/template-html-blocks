<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Features - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5 bg-light">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Recursos Principais</h2>
      <div class="row g-4">
        <div class="col-md-6 col-lg-3">
          <div class="text-center">
            <div class="bg-primary bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
              <i class="bi bi-code-square text-white fs-4"></i>
            </div>
            <h5 class="fw-bold">Código Limpo</h5>
            <p class="text-muted small">Lorem ipsum dolor sit amet, consectetur.</p>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="text-center">
            <div class="bg-success bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
              <i class="bi bi-phone text-white fs-4"></i>
            </div>
            <h5 class="fw-bold">Responsivo</h5>
            <p class="text-muted small">Lorem ipsum dolor sit amet, consectetur.</p>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="text-center">
            <div class="bg-warning bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
              <i class="bi bi-palette text-dark fs-4"></i>
            </div>
            <h5 class="fw-bold">Customizável</h5>
            <p class="text-muted small">Lorem ipsum dolor sit amet, consectetur.</p>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="text-center">
            <div class="bg-danger bg-gradient rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
              <i class="bi bi-lightning-charge text-white fs-4"></i>
            </div>
            <h5 class="fw-bold">Rápido</h5>
            <p class="text-muted small">Lorem ipsum dolor sit amet, consectetur.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
