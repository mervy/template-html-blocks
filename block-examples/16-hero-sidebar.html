<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-white">

  <section class="py-4">
    <div class="container-xl">
      <div class="row g-4">

        <!-- Artigo principal grande -->
        <div class="col-lg-8">
          <a href="#" class="text-decoration-none text-dark">
            <div class="position-relative rounded-3 overflow-hidden" style="height:380px;">
              <img src="https://picsum.photos/id/1015/900/600" class="w-100 h-100 object-fit-cover" alt="">
              <div class="position-absolute top-0 start-0 end-0 bottom-0" style="background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.3) 50%,transparent 100%);"></div>
              <div class="position-absolute bottom-0 start-0 p-4">
                <h2 class="text-white fw-bold lh-sm mb-2">7 grandes novas funções do Siri chegando no overhaul do iOS 27</h2>
              </div>
            </div>
          </a>
        </div>

        <!-- Sidebar com 2 artigos -->
        <div class="col-lg-4 d-flex flex-column gap-4">

          <a href="#" class="text-decoration-none text-dark">
            <div class="position-relative rounded-3 overflow-hidden mb-2" style="height:175px;">
              <img src="https://picsum.photos/id/366/500/350" class="w-100 h-100 object-fit-cover" alt="">
            </div>
            <h6 class="fw-bold lh-sm mb-1">YouTuber faz 'hands-on' com estranha variante do iPhone Ultra</h6>
            <small class="text-muted" style="font-size:.75rem;">NILAY PATEL · 3 HORAS ATRÁS</small>
          </a>

          <a href="#" class="text-decoration-none text-dark">
            <div class="position-relative rounded-3 overflow-hidden mb-2" style="height:175px;">
              <img src="https://picsum.photos/id/60/500/350" class="w-100 h-100 object-fit-cover" alt="">
            </div>
            <h6 class="fw-bold lh-sm mb-1">Se você comprou um iPhone no ano passado, pode ter um cheque de R$479 chegando</h6>
            <small class="text-muted" style="font-size:.75rem;">CHRIS WELCH · 5 HORAS ATRÁS</small>
          </a>

        </div>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
