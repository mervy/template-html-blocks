<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Cards com Imagem</h2>
      <div class="row g-4">
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow h-100">
            <img src="https://picsum.photos/400/250?random=3" alt="Card" class="card-img-top">
            <div class="card-body">
              <h5 class="card-title">Card com Imagem</h5>
              <p class="card-text text-muted">Lorem ipsum dolor sit amet, consectetur adipisicing.</p>
              <a href="#" class="btn btn-primary btn-sm">Saiba Mais</a>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow h-100">
            <img src="https://picsum.photos/400/250?random=4" alt="Card" class="card-img-top">
            <div class="card-body">
              <h5 class="card-title">Outro Card</h5>
              <p class="card-text text-muted">Lorem ipsum dolor sit amet, consectetur adipisicing.</p>
              <a href="#" class="btn btn-primary btn-sm">Saiba Mais</a>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="card border-0 shadow h-100">
            <img src="https://picsum.photos/400/250?random=5" alt="Card" class="card-img-top">
            <div class="card-body">
              <h5 class="card-title">Terceiro Card</h5>
              <p class="card-text text-muted">Lorem ipsum dolor sit amet, consectetur adipisicing.</p>
              <a href="#" class="btn btn-primary btn-sm">Saiba Mais</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
