<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards Image - Block Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <section class="py-5">
    <div class="container-xxl">
      <h2 class="text-center fw-bold mb-5">Cards de Imagem em Grid</h2>
      <div class="row g-3">
        <div class="col-md-6 col-lg-4">
          <div class="ratio ratio-16x9">
            <img src="https://picsum.photos/400/300?random=9" alt="Gallery" class="img-fluid rounded object-fit-cover">
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="ratio ratio-16x9">
            <img src="https://picsum.photos/400/300?random=10" alt="Gallery" class="img-fluid rounded object-fit-cover">
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="ratio ratio-16x9">
            <img src="https://picsum.photos/400/300?random=11" alt="Gallery" class="img-fluid rounded object-fit-cover">
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="ratio ratio-16x9">
            <img src="https://picsum.photos/400/300?random=12" alt="Gallery" class="img-fluid rounded object-fit-cover">
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="ratio ratio-16x9">
            <img src="https://picsum.photos/400/300?random=13" alt="Gallery" class="img-fluid rounded object-fit-cover">
          </div>
        </div>
        <div class="col-md-6 col-lg-4">
          <div class="ratio ratio-16x9">
            <img src="https://picsum.photos/400/300?random=14" alt="Gallery" class="img-fluid rounded object-fit-cover">
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
