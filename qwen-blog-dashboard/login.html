<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • BlogTech</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    body { 
      background: linear-gradient(135deg, #0dcaf0 0%, #0d6efd 100%); 
      min-height: 100vh;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4">

  <!-- 🔙 Link para Home -->
  <a href="index.html" class="position-absolute top-0 start-0 m-3 text-white text-decoration-none d-flex align-items-center gap-2">
    <i class="bi bi-arrow-left"></i>
    <span class="small fw-medium">Voltar à Home</span>
  </a>

  <!-- 📦 Card de Login Centralizado -->
  <div class="card border-0 shadow-lg" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4 p-lg-5">
      
      <!-- Header do Form -->
      <div class="text-center mb-4">
        <div class="bg-info bg-gradient rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 64px; height: 64px;">
          <i class="bi bi-person-fill display-6 text-white"></i>
        </div>
        <h3 class="fw-bold mb-1">Bem-vindo de volta! 👋</h3>
        <p class="text-muted small">Faça login para continuar navegando</p>
      </div>

      <!-- Formulário -->
      <form>
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label small text-muted">E-mail</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-envelope text-muted"></i>
            </span>
            <input type="email" class="form-control border-start-0" placeholder="seu@email.com" required>
          </div>
        </div>

        <!-- Senha -->
        <div class="mb-3">
          <label class="form-label small text-muted">Senha</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" class="form-control border-start-0" placeholder="••••••••" required>
            <button class="btn btn-outline-secondary border-start-0" type="button" title="Mostrar senha">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <!-- Opções -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label small text-muted" for="rememberMe">Lembrar de mim</label>
          </div>
          <a href="#" class="small text-info text-decoration-none fw-medium">Esqueceu a senha?</a>
        </div>

        <!-- Botão Login -->
        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>

        <!-- Divider -->
        <div class="text-center text-muted small mb-3">ou continue com</div>

        <!-- Social Login -->
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-outline-danger">
            <i class="bi bi-google me-2"></i>Google
          </button>
          <button type="button" class="btn btn-outline-dark">
            <i class="bi bi-github me-2"></i>GitHub
          </button>
        </div>
      </form>

      <!-- Link para Register -->
      <div class="text-center mt-4 pt-3 border-top">
        <span class="text-muted small">Não tem uma conta? </span>
        <a href="register.html" class="text-info text-decoration-none fw-medium">Criar conta grátis</a>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
