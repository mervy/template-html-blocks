<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta • BlogTech</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    body { 
      background: linear-gradient(135deg, #0dcaf0 0%, #0d6efd 100%); 
      min-height: 100vh;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4">

  <!-- 🔙 Link para Home -->
  <a href="index.html" class="position-absolute top-0 start-0 m-3 text-white text-decoration-none d-flex align-items-center gap-2">
    <i class="bi bi-arrow-left"></i>
    <span class="small fw-medium">Voltar à Home</span>
  </a>

  <!-- 📦 Card de Registro Centralizado -->
  <div class="card border-0 shadow-lg" style="max-width: 480px; width: 100%;">
    <div class="card-body p-4 p-lg-5">
      
      <!-- Header do Form -->
      <div class="text-center mb-4">
        <div class="bg-success bg-gradient rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 64px; height: 64px;">
          <i class="bi bi-person-plus-fill display-6 text-white"></i>
        </div>
        <h3 class="fw-bold mb-1">Crie sua conta grátis 🚀</h3>
        <p class="text-muted small">Junte-se a milhares de leitores tech</p>
      </div>

      <!-- Formulário -->
      <form>
        <!-- Nome -->
        <div class="mb-3">
          <label class="form-label small text-muted">Nome completo</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input type="text" class="form-control border-start-0" placeholder="Seu nome" required>
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label small text-muted">E-mail</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-envelope text-muted"></i>
            </span>
            <input type="email" class="form-control border-start-0" placeholder="seu@email.com" required>
          </div>
        </div>

        <!-- Senha -->
        <div class="mb-3">
          <label class="form-label small text-muted">Senha</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" class="form-control border-start-0" placeholder="Mínimo 8 caracteres" required minlength="8">
            <button class="btn btn-outline-secondary border-start-0" type="button" title="Mostrar senha">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="form-text small">Use letras, números e símbolos para mais segurança</div>
        </div>

        <!-- Confirmar Senha -->
        <div class="mb-4">
          <label class="form-label small text-muted">Confirmar senha</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock-fill text-muted"></i>
            </span>
            <input type="password" class="form-control border-start-0" placeholder="Repita sua senha" required>
          </div>
        </div>

        <!-- Termos -->
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="termsCheck" required>
          <label class="form-check-label small text-muted" for="termsCheck">
            Concordo com os <a href="#" class="text-info text-decoration-none">Termos de Uso</a> e <a href="#" class="text-info text-decoration-none">Política de Privacidade</a>
          </label>
        </div>

        <!-- Botão Register -->
        <button type="submit" class="btn btn-success btn-lg w-100 mb-3">
          <i class="bi bi-person-plus me-2"></i>Criar Conta
        </button>

        <!-- Divider -->
        <div class="text-center text-muted small mb-3">ou cadastre-se com</div>

        <!-- Social Register -->
        <div class="d-grid gap-2">
          <button type="button" class="btn btn-outline-danger">
            <i class="bi bi-google me-2"></i>Google
          </button>
          <button type="button" class="btn btn-outline-dark">
            <i class="bi bi-github me-2"></i>GitHub
          </button>
        </div>
      </form>

      <!-- Link para Login -->
      <div class="text-center mt-4 pt-3 border-top">
        <span class="text-muted small">Já tem uma conta? </span>
        <a href="login.html" class="text-info text-decoration-none fw-medium">Fazer login</a>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
